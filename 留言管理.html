<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言管理 - 广州致迪雅货运</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .message-list {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .message-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        .message-item:hover {
            background: #f8f9fa;
        }

        .message-item:last-child {
            border-bottom: none;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .message-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .message-time {
            font-size: 0.8rem;
            color: #95a5a6;
        }

        .message-content {
            line-height: 1.6;
            color: #34495e;
            white-space: pre-wrap;
        }

        .message-phone {
            color: #3498db;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #95a5a6;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 留言管理系统</h1>
            <p>查看和管理客户留言</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">0</div>
                <div class="label">总留言数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="todayCount">0</div>
                <div class="label">今日留言</div>
            </div>
        </div>

        <div class="message-list" id="messageList">
            <div class="empty-state">
                <i>📭</i>
                <p>暂无留言</p>
            </div>
        </div>

        <div class="header" style="margin-top: 20px;">
            <h2>操作</h2>
            <div class="btn-group">
                <button class="btn btn-danger" onclick="clearAllMessages()">清空所有留言</button>
                <button class="btn btn-primary" onclick="refreshMessages()">刷新列表</button>
            </div>
        </div>
    </div>

    <script>
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
            const messageList = document.getElementById('messageList');
            const totalCount = document.getElementById('totalCount');
            const todayCount = document.getElementById('todayCount');

            totalCount.textContent = messages.length;

            const today = new Date().toDateString();
            const todayMessages = messages.filter(msg => 
                new Date(msg.timestamp).toDateString() === today
            );
            todayCount.textContent = todayMessages.length;

            if (messages.length === 0) {
                messageList.innerHTML = `
                    <div class="empty-state">
                        <i>📭</i>
                        <p>暂无留言</p>
                    </div>
                `;
                return;
            }

            messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            messageList.innerHTML = messages.map((msg, index) => `
                <div class="message-item">
                    <div class="message-header">
                        <span class="message-name">留言 ${index + 1}</span>
                        <span class="message-time">${msg.timestamp}</span>
                    </div>
                    <div class="message-content">${msg.body}</div>
                </div>
            `).join('');
        }

        function clearAllMessages() {
            if (confirm('确定要清空所有留言吗？此操作不可撤销。')) {
                localStorage.removeItem('contactMessages');
                loadMessages();
                alert('已清空所有留言');
            }
        }

        function refreshMessages() {
            loadMessages();
            alert('列表已刷新');
        }

        loadMessages();
    </script>
</body>
</html>
